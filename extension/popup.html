<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="popup.css" />
		<title>JobTrackr</title>
	</head>
	<body>
		<header class="hdr">
			<span class="logo">JT</span>
			<div class="hdr-text">
				<h1>JobTrackr</h1>
				<span id="platform" class="platform">—</span>
			</div>
			<button id="gear" class="gear" title="Settings" aria-label="Settings">⚙</button>
		</header>

		<section id="settings" class="settings hidden">
			<label for="baseUrl">JobTrackr URL</label>
			<div class="row">
				<input id="baseUrl" type="text" placeholder="http://localhost:3000" />
				<button id="saveSettings" class="btn-mini">Save</button>
			</div>
			<p class="hint">Where your local <code>npm run dev</code> server is running.</p>

			<div class="divider"></div>

			<label class="check">
				<input id="notifyEnabled" type="checkbox" />
				<span>Weekly new-job alert</span>
			</label>
			<p class="hint">
				Checks your regional SEEK searches every <strong>Monday ~10am</strong> (Sydney), adds new
				matches to your board, and notifies you. Runs on next launch if Chrome was closed.
			</p>
			<div class="row">
				<button id="checkNow" class="btn-mini">Check now</button>
				<span id="checkStatus" class="hint mono"></span>
			</div>
		</section>

		<main id="form" class="form">
			<label for="title">Job title</label>
			<input id="title" type="text" />

			<label for="company">Company</label>
			<input id="company" type="text" />

			<label for="location">Location</label>
			<input id="location" type="text" />

			<label for="salary">Salary <span class="opt">(optional)</span></label>
			<input id="salary" type="text" />

			<button id="save" class="btn-save">Save to JobTrackr</button>
		</main>

		<p id="status" class="status" role="status"></p>

		<script src="popup.js"></script>
	</body>
</html>
